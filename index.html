<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rule Kaidum Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, remove, onValue, update }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyAGuKWpmm4h7FhJXvFIHv01laBswMQECZk",
    authDomain:        "rulekaidum-e6ebc.firebaseapp.com",
    databaseURL:       "https://rulekaidum-e6ebc-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "rulekaidum-e6ebc",
    storageBucket:     "rulekaidum-e6ebc.firebasestorage.app",
    messagingSenderId: "393827066832",
    appId:             "1:393827066832:web:68c29ce569d9fa5a27cfd5",
    measurementId:     "G-4CJL5QRN6Z"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // ส่งต่อ Firebase ให้ไฟล์ JS ใช้งาน
  window._fbDB      = db;
  window._fbRef     = ref;
  window._fbSet     = set;
  window._fbGet     = get;
  window._fbRemove  = remove;
  window._fbOnValue = onValue;
  window._fbUpdate  = update;
  window._fbReady   = true;
  document.dispatchEvent(new Event('firebase-ready'));
</script>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="#" class="logo" onclick="scrollTopToTop()">
      <div class="logo-icon">🐔</div>
      <div>
        <span class="logo-text">RULE KAIDUM</span>
        <span class="logo-sub">แหล่งรวมรูปภาพอาณาจักรไก่ดำ</span>
      </div>
    </a>
    <div class="header-right">
      <span class="header-badge" id="headerCount">0 IMAGES</span>
      <button class="hamburger" id="hamBtn" onclick="toggleMenu()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<nav class="mobile-menu" id="mobileMenu">
  <a href="#gallery" onclick="toggleMenu()">🖼 Gallery</a>
  <a href="#" onclick="scrollTopToTop()">⬆ Top</a>
  <a href="#" onclick="clearAll()">🗑 Clear All</a>
  <a href="#" onclick="loadSamples()">✨ Load Samples</a>
</nav>

<main>
  <div class="search-section">
    <span class="search-label">🔍 ค้นหารูปภาพ</span>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="ค้นหาจากชื่อ หรือ ราคา (เช่น 150, ฿, THB)..." oninput="filterCards()">
      <button class="search-clear" id="clearSearch" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <div class="upload-section">
    <div class="upload-title">➕ เพิ่มรูปภาพใหม่</div>
    <div class="upload-form-row">
      <div class="form-group">
        <label>เลือกรูปภาพ</label>
        <div class="upload-drop" id="dropZone" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFile(event)">
          <input type="file" id="fileInput" accept="image/*" onchange="fileChosen(event)" multiple>
          <div class="upload-drop-icon" id="dropIcon">📂</div>
          <div class="upload-drop-text" id="dropText">คลิกหรือลากไฟล์มาวาง</div>
          <img class="upload-preview" id="uploadPreview">
        </div>
      </div>
      <div class="form-group">
        <label>ชื่อรูปภาพ</label>
        <input type="text" class="name-input" id="nameInput" placeholder="ใส่ชื่อรูปภาพ..." maxlength="60">
      </div>
      <div class="form-group">
        <label>ราคา (ไม่บังคับ)</label>
        <div class="price-input-wrap">
          <select class="currency-select" id="currencySelect">
            <option value="THB">฿ THB</option>
            <option value="USD">$ USD</option>
            <option value="JPY">¥ JPY</option>
            <option value="EUR">€ EUR</option>
            <option value="GBP">£ GBP</option>
            <option value="CNY">¥ CNY</option>
            <option value="KRW">₩ KRW</option>
            <option value="SGD">S$ SGD</option>
            <option value="MYR">RM MYR</option>
          </select>
          <input type="text" class="price-input" id="priceInput" placeholder="0.00" inputmode="decimal" oninput="validatePriceInput(this)">
        </div>
      </div>
      <div class="form-group">
        <label>&nbsp;</label>
        <button class="upload-btn" onclick="addImage()">UPLOAD ↑</button>
      </div>
    </div>
  </div>

  <div id="gallery">
    <div class="gallery-header">
      <span class="gallery-title">GALLERY</span>
      <span class="gallery-count" id="galleryCount">0 รูป</span>
    </div>
    <div class="filter-row" id="filterRow">
      <button class="filter-tag active" onclick="setFilter('all',this)">ทั้งหมด</button>
      <button class="filter-tag" onclick="setFilter('today',this)">วันนี้</button>
      <button class="filter-tag" onclick="setFilter('fav',this)">ที่ชอบ ❤</button>
    </div>
    
    <div class="gallery-grid" id="galleryGrid"></div>
    
    <div id="loadMoreTrigger" style="height: 20px; margin-top: 20px;"></div>
  </div>
</main>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-title">ยืนยันการลบ</div>
    <div class="confirm-msg">คุณต้องการลบ <span class="confirm-name" id="confirmItemName">รายการนี้</span> ออกจากแกลเลอรีใช่ไหม?<br><span style="font-size:0.8rem;color:rgba(255,140,140,0.6)">การลบจะไม่สามารถกู้คืนได้</span></div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm()">ยกเลิก</button>
      <button class="confirm-delete" id="confirmDeleteBtn">DELETE</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img class="lightbox-img" id="lightboxImg">
    <div class="lightbox-caption" id="lightboxCaption"></div>
    <div class="lightbox-caption" id="lightboxPrice" style="font-family:'Orbitron',monospace;font-size:0.8rem;color:var(--accent);margin-top:4px;letter-spacing:2px;"></div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script src="script.js"></script>
</body>
</html>
